name: Bug report
description: Something in Clickit does not work as described
title: "[Bug]: "
labels: ["bug", "needs triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this.

        **Before you write anything: do not include real clipboard contents.**
        No passwords, tokens, private messages, or screenshots of your clipboard
        history. Use synthetic examples such as "test text 123".

        If this has security or privacy implications, please stop and follow
        [SECURITY.md](../blob/main/SECURITY.md) to report it privately instead.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before reporting
      options:
        - label: I checked the README status table, and this is not a feature that is documented as unimplemented
          required: true
        - label: I searched existing issues
          required: true
        - label: This report contains no real clipboard contents
          required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you observe?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Be specific about what you copied and where you copied it from.
      placeholder: |
        1. Launch Clickit
        2. Copy the text "test 123" from TextEdit
        3. Click the menu-bar icon
        4. ...
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "14.6, 15.1, ..."
    validations:
      required: true

  - type: dropdown
    id: hardware
    attributes:
      label: Hardware
      options:
        - Apple silicon
        - Intel
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit or branch you built
      description: Clickit has no releases yet, so the commit hash is the version.
      placeholder: "main @ abc1234"
    validations:
      required: true

  - type: textarea
    id: content-type
    attributes:
      label: What kind of content was involved
      description: Text, a link, an image, a screenshot? Roughly how large?

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Run this while reproducing the problem and paste the output. Clickit logs
        metadata only, never clipboard contents, so this is safe to share.

        ```
        log stream --info --predicate 'subsystem == "com.clickit.Clickit"'
        ```
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Other clipboard managers running, unusual keyboard layout, and so on.
