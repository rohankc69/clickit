# SwiftLint configuration for Clickit.
#
# SwiftLint is not yet wired into CI (see ROADMAP, engineering follow-ups).
# Run it locally with `swiftlint` if you have it installed via Homebrew.

included:
  - Clickit
  - ClickitTests

excluded:
  - Clickit/Resources
  - build
  - DerivedData

# Rules that encode the project's stated engineering rules.
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  # SwiftUI view bodies legitimately nest deeply.
  - multiple_closures_with_trailing_closure

analyzer_rules:
  - unused_declaration
  - unused_import

# No force unwrapping is a hard project rule, not a suggestion.
force_unwrapping:
  severity: error

force_cast:
  severity: error

force_try:
  severity: error

# Implicitly-unwrapped optionals are permitted only for initialisation-order
# problems and must carry a comment. Kept as a warning so those cases surface
# in review rather than blocking the build.
implicitly_unwrapped_optional:
  severity: warning

line_length:
  warning: 120
  error: 160
  ignores_comments: false
  ignores_urls: true

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 400
  error: 600
  ignore_comment_only_lines: true

function_body_length:
  warning: 50
  error: 80

cyclomatic_complexity:
  warning: 10
  error: 15

nesting:
  type_level: 2

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - to
    - at

type_name:
  min_length: 3

trailing_comma:
  mandatory_comma: true

todo:
  severity: warning

reporter: xcode
